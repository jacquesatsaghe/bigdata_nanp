name: bigdata_nifi

x-airflow-common:
  &airflow-common
  #image: ${AIRFLOW_IMAGE_NAME:-apache/airflow:2.11.2}
  build: .
  environment:
    &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true' # set to False if you want your DAGS activated at creation
    # Chemin vers le binaire dbt dans le venv
    DBT_EXECUTABLE_PATH: /opt/airflow/dbt_venv/bin/dbt
    DBT_ROOT_PATH: /opt/airflow/dbt
    AIRFLOW__CORE__FERNET_KEY: ''
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__API__AUTH_BACKENDS: 'airflow.api.auth.backend.basic_auth,airflow.api.auth.backend.session'
    _PIP_ADDITIONAL_REQUIREMENTS: ${_PIP_ADDITIONAL_REQUIREMENTS:-}
    AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: 'true'
    AIRFLOW__OPENLINEAGE__NAMESPACE: dev_dbt
    AIRFLOW__OPENLINEAGE__DISABLED: "True" 
    AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_PASSWORDS_FILE: /tmp/simple_auth_manager_passwords.json
    AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_USERS: 'airflow:admin'
    # OPTIMISATION : Réduit la charge CPU du scheduler
    AIRFLOW__SCHEDULER__MIN_FILE_PROCESS_INTERVAL: 30 #Airflow vérifie les changements toutes les 30 secondes
    AIRFLOW__SCHEDULER__DAG_DIR_LIST_INTERVAL: 60 # every 60s: Is there any new .py files?
    AIRFLOW__CORE__PARALLELISM: 4
    AIRFLOW__CORE__MAX_ACTIVE_TASKS_PER_DAG: 2    
    AIRFLOW__CORE__LOAD_DEFAULT_CONNECTIONS: False # Désactive la création automatique des connexions par défaut    
    AIRFLOW__CORE__LAZY_LOAD_PLUGINS: True # Optimise le "Lazy Loading" (chargement à la demande)
    AIRFLOW__CORE__TEST_CONNECTION: Enabled # test connection activated
  volumes:
    - ./dags:/opt/airflow/dags
    - airflow_data_logs:/opt/airflow/logs
    - airflow_data_plugins:/opt/airflow/plugins
    - ./simple_auth_manager_passwords.json:/tmp/simple_auth_manager_passwords.json
  user: "${AIRFLOW_UID:-50000}:0"
  depends_on:
    &airflow-common-depends-on    
    postgres:
      condition: service_healthy
  networks:
    - bigdata

# Airflow upgrade (Version 3)
# https://airflow.apache.org/docs/apache-airflow/stable/installation/upgrading_to_airflow3.html#
# https://airflow.apache.org/docs/apache-airflow/stable/howto/docker-compose/index.html
services:

  airflow-webserver:
    <<: *airflow-common
    hostname: airflow-webserver
    container_name: airflow-webserver
    command: webserver --workers 2
    ports:
      - "8090:8080"  
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully
    deploy:
      resources:
        limits:
          memory: 1G

  airflow-scheduler:
    <<: *airflow-common
    hostname: airflow-scheduler
    container_name: airflow-scheduler
    command: scheduler    
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8974/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully
    deploy:
      resources:
        limits:
          memory: 1.5G
    ports: 
      - 5040:4040

  airflow-init:
    <<: *airflow-common
    hostname: airflow-init
    container_name: airflow-init
    command: bash -c "airflow db migrate && airflow users create \
      --username airflow \
      --password airflow \
      --firstname Admin \
      --lastname User \
      --role Admin \
      --email airflow@example.com"

  # from this folder
  # docker exec -i $(docker compose ps -q postgres) psql -U postgres -d airflow < [sql_script].sql
  postgres:
    image: debezium/postgres:15
    container_name: postgres
    hostname: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d airflow"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s 
    environment: 
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - share_data:/partage
      - postgres_data:/var/lib/postgresql/data
    command: >
      postgres -c wal_level=logical -c max_wal_senders=10 -c max_replication_slots=10
    ports: 
      - 5536:${POSTGRES_PORT}
    # OPTIMISATION : Limite les ressources DB
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - bigdata

  spark-master:
    #size: 551 MB
    image: apache/spark-py:v3.4.0
    container_name: spark-master
    hostname: spark-master
    user: root
    restart: always
    environment:
      SPARK_MODE: master
      SPARK_RPC_AUTHENTICATION_ENABLED: no
      SPARK_RPC_ENCRYPTION_ENABLED: no
      SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED: no
      SPARK_SSL_ENABLED: no
      SPARK_USER: spark
    # Commande explicite pour l'image officielle
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    ports:
      - "8980:8080" # UI Spark
      - "7977:7077"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://spark-master:8080/"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - bigdata
    volumes:
      - share_data:/partage
      - jupyter_pyspark_data:/opt/spark/work-dir
  
  spark-worker-1:
    image: apache/spark-py:v3.4.0
    container_name: spark-worker-1
    hostname: spark-worker-1
    user: root
    restart: always
    depends_on:
      spark-master:
        condition: service_healthy
    ports:
      - "8981:8081" # UI Spark Worker
    environment:
      SPARK_MODE: worker
      PYSPARK_PYTHON: python3
      SPARK_MASTER_URL: spark://spark-master:7077
      SPARK_WORKER_MEMORY: 1G
      SPARK_WORKER_CORES: 1
      SPARK_WORKER_WEBUI_PORT: 8081
      SPARK_RPC_AUTHENTICATION_ENABLED: no
      SPARK_RPC_ENCRYPTION_ENABLED: no
      SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED: no
      SPARK_SSL_ENABLED: no
      SPARK_USER: spark      
    volumes:
      #- pyspark_data:/opt/spark-apps # Dossier pour vos scripts Python
      - share_data:/partage
      - jupyter_pyspark_data:/opt/spark/work-dir
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    healthcheck:
      test: ["CMD", "curl", "-f", "http://spark-worker-1:8081/"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - bigdata


volumes:
  airflow_data:
    driver: local # Define the driver and options under the volume name
    driver_opts:
      type: none
      device: /home/patrick/Téléchargements/ressources/airflow
      o: bind
  airflow_data_logs:
    driver: local # Define the driver and options under the volume name
    driver_opts:
      type: none
      device: /home/patrick/Téléchargements/ressources/airflow/logs
      o: bind
  airflow_data_plugins:
    driver: local # Define the driver and options under the volume name
    driver_opts:
      type: none
      device: /home/patrick/Téléchargements/ressources/airflow/plugins
      o: bind
  share_data:
    driver: local # Define the driver and options under the volume name
    driver_opts:
      type: none
      device: /home/patrick/Téléchargements/ressources/share_folder
      o: bind
  postgres_data:
    driver: local # Define the driver and options under the volume name
    driver_opts:
      type: none
      device: /home/patrick/Téléchargements/ressources/postgres/postgres
      o: bind
  jupyter_pyspark_data:
    driver: local # Define the driver and options under the volume name
    driver_opts:
      type: none
      device: /home/patrick/Téléchargements/ressources/jupyter-pyspark
      o: bind


networks:
  bigdata:
    driver: bridge
    driver_opts:
      com.docker.network.bridge.name: bigdata_bridge
    
    
    
