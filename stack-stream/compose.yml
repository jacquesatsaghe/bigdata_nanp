#version: '3.8'
name: bigdata_files
services:
  kafka:
    #image: apache/kafka:latest
    # size: 227.2 MB
    image: apache/kafka:4.2.0-rc2
    hostname: kafka
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_LISTENERS: 'PLAINTEXT://:9092,CONTROLLER://:9093'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:9092'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@localhost:9093'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 2
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: true
    healthcheck:
      # Vérifie que le broker est prêt à accepter des connexions
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 --version || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10

  postgres:
    image: debezium/postgres:15 # Image optimisée pour le CDC (Change Data Capture)
    # size: 96MB
    hostname: postgres
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: db_tickets
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d inventory"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s # Laisse du temps pour l'initialisation initiale
    volumes:
      - /home/patrick/Téléchargements/ressources/bigdata/postgres:/var/lib/postgresql/data
      
  pgadmin:
    image: dpage/pgadmin4:snapshot
    #size: 176MB
    hostname: pgadmin
    container_name: pgadmin
    #user: "${UID}:${GID}" # Utilise vos identifiants Linux actuels
    user: "${UID}:${GID}"
    depends_on:
      postgres:
        condition: service_healthy # Attend que le healthcheck de 'postgres' passe
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    volumes:
      - /home/patrick/Téléchargements/ressources/bigdata/pgadmin:/var/lib/pgadmin
      
  elasticsearch:
    #size: 632.96 MB
    #user: elastic
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.2
    hostname: elasticsearch
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - action.auto_create_index=true
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - ELASTIC_PASSWORD=LundiMardi1234
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:9200/_cluster/health?wait_for_status=yellow&timeout=5s || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      
  kibana:
    #size: 354.57MB
    image: docker.elastic.co/kibana/kibana:8.12.2
    hostname: kibana
    container_name: kibana
    depends_on:
      elasticsearch:
        condition: service_healthy # Attend que le healthcheck ES soit OK
    ports:
      - "5601:5601"
    environment:
      ELASTICSEARCH_HOSTS: '["http://elasticsearch:9200"]'
      I18N_LOCALE: "fr-FR" # Interface en français
      ELASTICSEARCH_PASSWORD: LundiMardi1234
      XPACK_ENCRYPTEDSAVEDOBJECTS_ENCRYPTIONKEY: 7382af6016b1524dbc92046342d1d0d1
      XPACK_REPORTING_ENCRYPTIONKEY: 22eb3b1da051df0a2ef096d1bd896b83
      XPACK_SECURITY_ENCRYPTIONKEY: 7f52631ecb4de59e4e9de6478391fa51
      
  connect:
    image: confluentinc/cp-kafka-connect-base:7.7.7
    #size: 1.3GB
    hostname: connect
    container_name: connect
    depends_on:
      kafka:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      postgres:
        condition: service_healthy
    ports:
      - "8083:8083"
    environment:
      CONNECT_BOOTSTRAP_SERVERS: "kafka:9092"
      CONNECT_REST_ADVERTISED_HOST_NAME: "connect"
      CONNECT_GROUP_ID: "connect-cluster"
      CONNECT_CONFIG_STORAGE_TOPIC: "connect-configs"
      CONNECT_OFFSET_STORAGE_TOPIC: "connect-offsets"
      CONNECT_STATUS_STORAGE_TOPIC: "connect-status"
      CONNECT_KEY_CONVERTER: "org.apache.kafka.connect.json.JsonConverter"
      CONNECT_VALUE_CONVERTER: "org.apache.kafka.connect.json.JsonConverter"
      CONNECT_PLUGIN_PATH: "/usr/share/java,/usr/share/confluent-hub-components"
      CONNECT_REPLICATION_FACTOR: 1
      CONNECT_CONFIG_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_OFFSET_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_STATUS_STORAGE_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/"]
      interval: 10s
      timeout: 5s
      retries: 5
    command:
      - /bin/bash
      - -c
      - |
        # Installation des connecteurs Source (Postgres) et Sink (Elastic)
        until confluent-hub install --no-prompt debezium/debezium-connector-postgresql:latest; do sleep 5; done
        until confluent-hub install --no-prompt confluentinc/kafka-connect-jdbc:latest; do sleep 5; done
        until confluent-hub install --no-prompt confluentinc/kafka-connect-elasticsearch:latest; do sleep 5; done
        /etc/confluent/docker/run

  
