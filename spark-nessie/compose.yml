name: bigdata_nifi
services:

  spark-master:
    #size: 551 MB
    image: apache/spark-py:v3.4.0
    container_name: spark-master
    hostname: spark-master
    user: root
    restart: always
    environment:
      SPARK_MODE: master # If only master else disable
      SPARK_RPC_AUTHENTICATION_ENABLED: no
      SPARK_RPC_ENCRYPTION_ENABLED: no
      SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED: no
      SPARK_SSL_ENABLED: no
      SPARK_USER: spark
      ## only if also worker
      #PYSPARK_PYTHON: python3
      #SPARK_MASTER_URL: spark://spark-master:7077
      #SPARK_WORKER_MEMORY: 1G
      #SPARK_WORKER_CORES: 1
      #SPARK_WORKER_WEBUI_PORT: 8081
      # Minio Access
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: admin  # Minio username
      AWS_SECRET_ACCESS_KEY: password123  # Minio password
    # Commande explicite pour l'image officielle
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    ### Launch master as also worker node    
    #command: >
    #  /bin/bash -c "
    #  /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master & 
    #  sleep 5;
    #  /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    #  "
    ports:
      - "8980:8080" # UI Spark
      - "7977:7077"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://spark-master:8080/"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s    
    volumes:
      - share_data:/partage
      - jupyter_pyspark_data:/opt/spark/work-dir
    networks:
      - bigdata

  #spark-worker
  spark-worker-1:
    image: apache/spark-py:v3.4.0
    container_name: spark-worker-1
    hostname: spark-worker-1
    user: root
    restart: always
    depends_on:
      spark-master:
        condition: service_healthy
    ports:
      - "8981:8081" # UI Spark Worker
    environment:
      SPARK_MODE: worker
      PYSPARK_PYTHON: python3
      SPARK_MASTER_URL: spark://spark-master:7077
      SPARK_WORKER_MEMORY: 1G
      SPARK_WORKER_CORES: 1
      SPARK_RPC_AUTHENTICATION_ENABLED: no
      SPARK_RPC_ENCRYPTION_ENABLED: no
      SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED: no
      SPARK_SSL_ENABLED: no
      SPARK_USER: spark
      SPARK_WORKER_WEBUI_PORT: 8081
      # Minio Access
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: admin  # Minio username
      AWS_SECRET_ACCESS_KEY: password123  # Minio password
    volumes:
      #- pyspark_data:/opt/spark-apps # Dossier pour vos scripts Python
      - share_data:/partage
      - jupyter_pyspark_data:/opt/spark/work-dir
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    healthcheck:
      test: ["CMD", "curl", "-f", "http://spark-worker-1:8081/"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - bigdata

  # DECOMMENTER POUR ACTIVER UN SECOND SPARK WORKER
  spark-worker-2:
    image: apache/spark-py:v3.4.0
    container_name: spark-worker-2
    hostname: spark-worker-2
    user: root
    restart: always
    depends_on:
      spark-master:
        condition: service_healthy
    ports:
      - "8982:8082" # UI Spark Worker
    environment:
      SPARK_MODE: worker
      PYSPARK_PYTHON: python3
      SPARK_MASTER_URL: spark://spark-master:7077
      SPARK_WORKER_MEMORY: 1G
      SPARK_WORKER_CORES: 1
      SPARK_RPC_AUTHENTICATION_ENABLED: no
      SPARK_RPC_ENCRYPTION_ENABLED: no
      SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED: no
      SPARK_SSL_ENABLED: no
      SPARK_USER: spark
      SPARK_WORKER_WEBUI_PORT: 8082
      # Minio Access
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: admin  # Minio username
      AWS_SECRET_ACCESS_KEY: password123  # Minio password
    volumes:
      #- pyspark_data:/opt/spark-apps # Dossier pour vos scripts Python
      - share_data:/partage
      - jupyter_pyspark_data:/opt/spark/work-dir
    #command: sleep infinity
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    healthcheck:
      test: ["CMD", "curl", "-f", "http://spark-worker-2:8082/"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - bigdata


  jupyter-pyspark:
    image: jupyter/pyspark-notebook:spark-3.4.0
    #size: 1.7GB
    container_name: jupyter-pyspark
    hostname: jupyter-pyspark
    restart: always
    depends_on:
      spark-master:
        condition: service_healthy
      minio:
        condition: service_healthy
    user: root
    ports:
      - "8988:8888"
    environment:
      - JUPYTER_ENABLE_LAB=yes
      - JUPYTER_TOKEN=secret
      # USE THIS IF YOU WANT TO USE INTERNET TO DOWNLOAD
      #- PYSPARK_SUBMIT_ARGS=--packages org.apache.hadoop:hadoop-aws:3.3.4,com.amazonaws:aws-java-sdk-bundle:1.12.262,org.apache.iceberg:iceberg-spark-runtime-3.4_2.12:1.3.1,org.projectnessie.nessie-integrations:nessie-spark-extensions-3.4_2.12:0.99.0,software.amazon.awssdk:bundle:2.24.8,software.amazon.awssdk:url-connection-client:2.24.8 pyspark-shell
      # Minio Access
      - AWS_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=admin  # Minio username
      - AWS_SECRET_ACCESS_KEY=password123  # Minio password
    volumes:
      - jupyter_pyspark_data:/home/jovyan/work
      - share_data:/partage
      - ./jars:/home/jovyan/jars
      - ./notes:/notes
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8888/api/status"]
      interval: 10s # Vérifie toutes les 10 secondes
      timeout: 5s # Timeout de 5 secondes pour chaque tentative
      retries: 10 # Nombre de tentatives avant de considérer le service comme non sain
      start_period: 5s # Délai d'attente avant de commencer les vérifications de santé
    networks:
      - bigdata

  minio:
    image: quay.io/minio/minio:latest
    container_name: minio
    hostname: minio
    ports:
      - "9030:9000" # API S3
      - "9031:9001" # Console Web (UI)
    environment:
      # Access Key (Username) et de Secret Key (Password)
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123
    volumes:
      - minio_data:/data
      - share_data:/partage
    entrypoint: ["/bin/sh", "-c"] # On force le shell ici
    command: >
            "minio server /data --console-address ':9001' & 
             sleep 5; 
             mc alias set myalias http://localhost:9000 admin password123;
             wait"
    restart: always
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - bigdata

  catalog:
    #https://clickhouse.com/docs/use-cases/data-lake/nessie-catalog
    image: ghcr.io/projectnessie/nessie:0.99.0
    container_name: catalog
    hostname: catalog
    restart: always
    ports:
      - 19720:19120
    depends_on:
      minio:
        condition: service_healthy
      mariadb:
        condition: service_healthy
    volumes:
      - share_data:/partage
    environment:
      # Configuration de Nessie pour utiliser MinIO comme backend de stockage
      # Vous pouvez ajuster ces variables en fonction de votre configuration MinIO
      #- nessie.version.store.type=IN_MEMORY
      - nessie.catalog.default-warehouse=warehouse
      - nessie.catalog.warehouses.warehouse.location=s3://nessie-bucket/warehouse
      - nessie.catalog.service.s3.default-options.endpoint=http://minio:9000/
      - nessie.catalog.service.s3.default-options.access-key=urn:nessie-secret:quarkus:nessie.catalog.secrets.access-key
      - nessie.catalog.service.s3.default-options.path-style-access=true
      - nessie.catalog.service.s3.default-options.auth-type=STATIC
      - nessie.catalog.secrets.access-key.name=admin
      - nessie.catalog.secrets.access-key.secret=password123
      - nessie.catalog.service.s3.default-options.region=us-east-1
      - nessie.server.authentication.enabled=false
      # persistance avec une base de données relationnelle (ex: MySQL/MariaDB)
      # Configuration du stockage
      # 1. Active le stockage persistant via JDBC
      - NESSIE_VERSION_STORE_TYPE=JDBC
      # 2. Définit le dialecte SQL (MariaDB)
      - QUARKUS_DATASOURCE_DB_KIND=mariadb
      - NESSIE_VERSION_STORE_PERSIST_JDBC_DATASOURCE=mariadb # MySQL utilise le driver MariaDB compatible      
      # Configuration de la source de données (Quarkus)
      - QUARKUS_DATASOURCE_MARIADB_JDBC_URL=jdbc:mariadb://mariadb:3306/nessie_metadata
      - QUARKUS_DATASOURCE_MARIADB_USERNAME=mariadb
      - QUARKUS_DATASOURCE_MARIADB_PASSWORD=password
      # 4. Optimisation (Optionnel mais recommandé)
      - QUARKUS_HIBERNATE_ORM_DATABASE_GENERATION=update
    healthcheck:
      test: ["CMD", "curl", "-f", "http://catalog:19120/api/v1/trees"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - bigdata

  ### USED FOR CATALOG METADATA
  mariadb:
    image: mariadb:10.11
    container_name: mariadb
    hostname: mariadb
    restart: always
    ports:
      - 3416:3306
    environment:
      MARIADB_USER: mariadb
      MARIADB_PASSWORD: password
      MARIADB_DATABASE: nessie_metadata
      MARIADB_ROOT_PASSWORD: mariadb
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - mariadb_data:/var/lib/mysql
    networks:
      - bigdata

volumes:
  pyspark_data:
    driver: local # Define the driver and options under the volume name
    driver_opts:
      type: none
      device: /home/patrick/Téléchargements/ressources/pyspark
      o: bind
  jupyter_pyspark_data:
    driver: local # Define the driver and options under the volume name
    driver_opts:
      type: none
      device: /home/patrick/Téléchargements/ressources/jupyter-pyspark
      o: bind
  minio_data:
    driver: local # Define the driver and options under the volume name
    driver_opts:
      type: none
      device: /home/patrick/Téléchargements/ressources/minio
      o: bind
  mariadb_data:
    driver: local # Define the driver and options under the volume name
    driver_opts:
      type: none
      device: /home/patrick/Téléchargements/ressources/mariadb
      o: bind
  share_data:
    driver: local # Define the driver and options under the volume name
    driver_opts:
      type: none
      device: /home/patrick/Téléchargements/ressources/share_folder
      o: bind

networks:
  bigdata:
    driver: bridge
    driver_opts:
      com.docker.network.bridge.name: bigdata_bridge